name: Release VSIX

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-vsix:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile extension
        run: npm run compile

      - name: Compute VSIX name
        id: meta
        shell: bash
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          VSIX_NAME="${PACKAGE_NAME}-${PACKAGE_VERSION}.vsix"
          echo "vsix_name=${VSIX_NAME}" >> "$GITHUB_OUTPUT"

      - name: Package VSIX
        run: npm exec --yes @vscode/vsce package --out "${{ steps.meta.outputs.vsix_name }}"

      - name: Verify packaged VSIX
        run: python3 scripts/verify_vsix.py "${{ steps.meta.outputs.vsix_name }}"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.vsix_name }}
          path: ${{ steps.meta.outputs.vsix_name }}

      - name: Attach VSIX to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.meta.outputs.vsix_name }}
          generate_release_notes: true
