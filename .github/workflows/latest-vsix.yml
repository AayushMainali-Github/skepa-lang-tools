name: Latest VSIX

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-latest-vsix:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile extension
        run: npm run compile

      - name: Stamp latest build version
        id: version
        shell: bash
        run: |
          VERSION=$(node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8')); const base = pkg.version.split('-')[0]; const parts = base.split('.').map(Number); const stamped = parts[0] + '.' + parts[1] + '.' + (parts[2] + 1) + '-latest.' + process.env.GITHUB_RUN_NUMBER; pkg.version = stamped; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n'); process.stdout.write(stamped);")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Package latest VSIX
        run: npm exec --yes @vscode/vsce -- package --out skepa-tools-latest.vsix

      - name: Update latest tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f latest
          git push origin refs/tags/latest --force

      - name: Publish latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest VSIX Build
          body: |
            Rolling latest build of the Skepa Tools extension from `main`.

            Version: `${{ steps.version.outputs.version }}`
            Commit: `${{ github.sha }}`

            Download `skepa-tools-latest.vsix` and install it in VS Code with:
            `Extensions -> ... -> Install from VSIX...`
          files: skepa-tools-latest.vsix
          prerelease: true
          make_latest: false
